name: xworkout
description: 轻量级健身记录软件 - 简洁、离线、跨平台
publish_to: 'none'
version: 4.9.6

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.0
  
  # 数据库
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.41
  
  # 路由
  go_router: ^17.1.0
  
  # 图标
  phosphor_flutter: ^1.4.0
  cupertino_icons: ^1.0.8
  
  # 日期处理
  intl: ^0.20.2
  
  fl_chart: ^0.69.0
  share_plus: ^10.0.0
  permission_handler: ^11.3.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  shared_preferences: ^2.5.4
  path_provider: ^2.1.1
  path: ^1.8.3
  uuid: ^4.2.2
  table_calendar: ^3.2.0
  pdf: ^3.11.3
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.14.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
