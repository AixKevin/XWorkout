## 数据模型

### Exercise (训练项目)
```
id: String (UUID)
name: String (项目名称)
category: String? (分类：胸/背/腿/肩/臂/核心/有氧/自定义)
defaultSets: int (默认组数)
defaultReps: int (默认次数)
defaultWeight: double? (默认重量)
defaultDuration: int? (默认时长-秒)
note: String? (备注)
createdAt: DateTime
```

### WorkoutPlan (健身计划)
```
id: String (UUID)
name: String (计划名称)
cycleDays: int (循环天数)
isActive: bool (是否激活)
startDate: DateTime (开始日期)
createdAt: DateTime
```

### PlanDay (计划中的某天)
```
id: String (UUID)
planId: String (所属计划)
dayIndex: int (在周期中的索引 0-n)
isRestDay: bool (是否休息日)
note: String? (备注)
```

### DayExercise (当天训练项目)
```
id: String (UUID)
planDayId: String (所属计划日)
exerciseId: String (训练项目)
order: int (排序)
targetSets: int (目标组数)
targetReps: int (目标次数)
targetWeight: double? (目标重量)
```

### DailyRecord (每日记录)
```
id: String (UUID)
date: DateTime (日期)
planDayId: String? (来自哪天计划)
status: String (normal/rest/skipped)
skipReason: String? (偷懒原因)
note: String? (备注)
```

### ExerciseRecord (训练记录)
```
id: String (UUID)
dailyRecordId: String (所属每日记录)
exerciseId: String (训练项目)
actualSets: int (实际组数)
actualReps: List<int> (每组实际次数)
actualWeight: List<double?> (每组实际重量)
isCompleted: bool (是否完成)
note: String? (备注)
```

### AppSettings (应用设置)
```
id: int (单例)
currentPlanId: String? (当前激活的计划)
currentCycleDay: int (当前周期天数)
lastActiveDate: DateTime (最后活跃日期)
skipHistory: List<SkipRecord> (偷懒历史)
```

## UI设计规范

### 颜色
- 主色: iOS Blue (#007AFF)
- 背景: 系统背景色
- 卡片: 系统二级背景色
- 文字: 系统文字色

### 字体
- 使用系统字体 (SF Pro on iOS, Roboto on Android)
- 标题: Semibold 17pt
- 正文: Regular 15pt
- 说明: Regular 13pt

### 间距
- 页面边距: 16pt
- 卡片间距: 12pt
- 元素间距: 8pt

### 圆角
- 卡片: 12pt
- 按钮: 10pt
- 输入框: 8pt
