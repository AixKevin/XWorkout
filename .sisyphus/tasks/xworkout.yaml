# XWorkout - 健身记录软件开发计划

## 项目概述
- **名称**: XWorkout
- **定位**: 轻量级健身记录软件
- **平台**: Android优先，后续跨平台
- **风格**: Apple风格，简洁现代
- **语言**: 简体中文

## 技术栈
- Flutter 3.x + Dart
- Riverpod (状态管理)
- Drift (SQLite数据库)
- go_router (路由)
- Phosphor Icons (图标)

